baseURL = "https://theafterthought.space"
languageCode = "pt-br"
defaultContentLanguage = "pt"
title = "the afterthought space"
theme = "thoughtout"
paginate = 10

[languages]
  [languages.pt]
    title = "the afterthought space"
    weight = 1
    contentDir = "content/pt"
    languageName = "Português"
    [languages.pt.params]
        description = "Um espaço para pensamentos e desabafos em português."
    [[languages.pt.menu.main]]
        name = "🏠 Página Principal"
        url = "/"
        weight = 10
    [[languages.pt.menu.main]]
        name = "🗞 Posts"
        url = "/posts/"
        weight = 20
    [[languages.pt.menu.main]]
        name = "🧠 Sobre Mim"
        url = "/about-me/"
        weight = 30
    [[languages.pt.menu.main]] # Adicione o item para o switcher de idioma
        name = "🌐" # Nome que aparecerá no menu (será substituído pelo JS)
        identifier = "language-switcher" # Identificador único
        weight = 40
    [[languages.pt.menu.main]] # Adicione o item para o switcher de tema
        name = "💡" # Nome que aparecerá no menu (será substituído pelo JS)
        identifier = "theme-toggle" # Identificador único
        weight = 50

  [languages.en]
    title = "the afterthought space"
    weight = 2
    contentDir = "content/en"
    languageName = "English"
    [languages.en.params]
        description = "A space for tangled thoughts and unfiltered expression in English."
    [[languages.en.menu.main]]
        name = "🏠 Home"
        url = "/en/"
        weight = 10
    [[languages.en.menu.main]]
        name = "🗞 Posts"
        url = "/en/posts/"
        weight = 20
    [[languages.en.menu.main]]
        name = "🧠 About Me"
        url = "/en/about-me/"
        weight = 30
    [[languages.en.menu.main]] # Adicione o item para o switcher de idioma
        name = "🌐"
        identifier = "language-switcher"
        weight = 40
    [[languages.en.menu.main]] # Adicione o item para o switcher de tema
        name = "💡"
        identifier = "theme-toggle"
        url= "#"
        weight = 50

[params]
  defaultTheme = "light"
  description = ":3"
  # Add useful global params
  author = "miiiig"
  favicon = "/favicon.ico"
  keywords = ["blog", "thoughts", "multilingual"]
  
  # Privacy and performance
  privacy_policy_url = "/privacy/"
  
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      autoHeadingID = true
      autoHeadingIDType = "github"
  [markup.highlight]
    style = "github"
    lineNos = true
    tabWidth = 2

# SEO improvements
[sitemap]
  changefreq = "weekly"
  priority = 0.5

# Privacy settings (optional)
[privacy]
  [privacy.googleAnalytics]
    disable = false
    respectDoNotTrack = true
  [privacy.youtube]
    privacyEnhanced = true